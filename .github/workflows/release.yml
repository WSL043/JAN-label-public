name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-release-ready:
    name: verify-release-ready
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate release notes draft
        shell: bash
        run: |
          pnpm release:notes --version "${GITHUB_REF_NAME}"
      - name: Require desktop-shell version matches tag
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#v}"
          package_version=$(node -p "require('./apps/desktop-shell/package.json').version")
          tauri_version=$(node -p "require('./apps/desktop-shell/src-tauri/tauri.conf.json').version")
          if [[ "$package_version" != "$expected" ]]; then
            echo "apps/desktop-shell/package.json version $package_version does not match tag $expected."
            exit 1
          fi
          if [[ "$tauri_version" != "$expected" ]]; then
            echo "apps/desktop-shell/src-tauri/tauri.conf.json version $tauri_version does not match tag $expected."
            exit 1
          fi
      - name: Upload release notes draft
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-draft
          path: docs/release/${{ github.ref_name }}.md

  publish-windows-release:
    name: publish-windows-release
    needs: verify-release-ready
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - run: pnpm install --frozen-lockfile
      - name: Generate release notes draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm release:notes --version $env:GITHUB_REF_NAME
      - name: Build desktop-shell companion
        run: cargo build --manifest-path apps/desktop-shell/src-tauri/Cargo.toml --release
      - name: Generate release readiness report
        run: pnpm release:readiness --version $env:GITHUB_REF_NAME
      - name: Upload release readiness artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-readiness
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
            docs/release/${{ github.ref_name }}.md
      - name: Publish native shell
        run: dotnet publish apps/windows-shell/JanLabel.WindowsShell.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Assert companion binary in publish output
        shell: powershell
        run: |
          $companion = "apps/windows-shell/bin/Release/net8.0-windows/win-x64/publish/desktop-shell.exe"
          if (-not (Test-Path $companion)) {
            Write-Error "Expected companion binary in native-shell publish output: $companion"
          }
      - name: Build native shell installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "apps/windows-shell/dist" | Out-Null
          $outputDir = (Resolve-Path "apps/windows-shell/dist").Path
          $outputBaseFilename = "JAN-Label_windows-native-shell_$env:GITHUB_REF_NAME"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:GITHUB_REF_NAME" `
            "/DMyOutputDir=$outputDir" `
            "/DMyOutputBaseFilename=$outputBaseFilename" `
            "apps/windows-shell/installer/JanLabel.WindowsShell.iss"
          $installer = Join-Path $outputDir "$outputBaseFilename.exe"
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash
          Set-Content -Path "$installer.sha256" -Value "$hash  $(Split-Path $installer -Leaf)"
      - name: Upload native shell installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: jan-label-native-shell-release-installer
          path: |
            apps/windows-shell/dist/*.exe
            apps/windows-shell/dist/*.sha256
          if-no-files-found: error
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-shell
          tagName: ${{ github.ref_name }}
          releaseName: JAN Label ${{ github.ref_name }}
          releaseDraft: true
          releaseBody: |
            Windows desktop installer built from `apps/desktop-shell`.
            See the generated notes below for merged changes in this tag.
          generateReleaseNotes: true
          args: --ci --no-sign
          assetNamePattern: JAN-Label_[version]_windows_[arch][setup][ext]
      - name: Upload native shell assets to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem "apps/windows-shell/dist/*.exe", "apps/windows-shell/dist/*.sha256" | ForEach-Object { $_.FullName }
          gh release upload $env:GITHUB_REF_NAME $assets --clobber
      - name: Publish completed GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit $env:GITHUB_REF_NAME --draft=false
