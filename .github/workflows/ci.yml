name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-format:
    name: rust-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-lint:
    name: rust-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --lib --exclude render

  golden-tests:
    name: golden-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p render --lib

  fixture-validation:
    name: fixture-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm fixture:validate

  web-format-lint:
    name: web-format-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  web-typecheck:
    name: web-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  desktop-shell-windows:
    name: desktop-shell-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/desktop-shell
          args: --ci --no-sign
      - uses: actions/upload-artifact@v4
        with:
          name: jan-label-windows-bundle
          path: apps/desktop-shell/src-tauri/target/release/bundle/**
          if-no-files-found: error

  docs-guard:
    name: docs-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Enforce docs updates for product changes
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          product_changed=false
          docs_changed=false

          while IFS= read -r path; do
            case "$path" in
              apps/*|crates/*|packages/*|scripts/*)
                product_changed=true
                ;;
            esac

            case "$path" in
              docs/*|README.md|CONTRIBUTING.md|SECURITY.md)
                docs_changed=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [[ "$product_changed" == "true" && "$docs_changed" != "true" ]]; then
            echo "Product code changed without docs update."
            exit 1
          fi
