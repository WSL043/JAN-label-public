name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-format:
    name: rust-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-lint:
    name: rust-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --lib --exclude render

  golden-tests:
    name: golden-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p render svg_matches_golden_fixture -- --exact

  fixture-validation:
    name: fixture-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm fixture:validate

  web-format-lint:
    name: web-format-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  web-typecheck:
    name: web-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  docs-guard:
    name: docs-guard
    runs-on: ubuntu-latest
    steps:
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            product:
              - 'apps/**'
              - 'crates/**'
              - 'packages/**'
              - 'scripts/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
      - name: Enforce docs updates for product changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            exit 0
          fi

          if [[ "${{ steps.changes.outputs.product }}" == "true" && "${{ steps.changes.outputs.docs }}" != "true" ]]; then
            echo "Product code changed without docs update."
            exit 1
          fi

