name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-format:
    name: rust-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-lint:
    name: rust-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --lib --exclude render

  golden-tests:
    name: golden-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p render --lib

  fixture-validation:
    name: fixture-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm fixture:validate

  web-format-lint:
    name: web-format-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  web-typecheck:
    name: web-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Enable Corepack
        run: |
          corepack enable
          corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  desktop-shell-windows:
    name: desktop-shell-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path apps/desktop-shell/src-tauri/Cargo.toml
      - run: cargo build --manifest-path apps/desktop-shell/src-tauri/Cargo.toml --release
      - name: Assert companion build output
        shell: powershell
        run: |
          $companion = "apps/desktop-shell/src-tauri/target/release/desktop-shell.exe"
          if (-not (Test-Path $companion)) {
            Write-Error "Expected companion binary output: $companion"
          }
      - uses: actions/upload-artifact@v7
        with:
          name: jan-label-companion
          path: apps/desktop-shell/src-tauri/target/release/desktop-shell.exe
          if-no-files-found: error

  windows-shell-native:
    name: windows-shell-native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Build desktop-shell companion
        run: cargo build --manifest-path apps/desktop-shell/src-tauri/Cargo.toml --release
      - run: dotnet build apps/windows-shell/JanLabel.WindowsShell.csproj -c Release
      - run: dotnet test apps/windows-shell-tests/JanLabel.WindowsShell.Tests.csproj -c Release
      - run: dotnet publish apps/windows-shell/JanLabel.WindowsShell.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      - name: Assert companion binary in publish output
        shell: powershell
        run: |
          $companion = "apps/windows-shell/bin/Release/net8.0-windows/win-x64/publish/desktop-shell.exe"
          if (-not (Test-Path $companion)) {
            Write-Error "Expected companion binary in native-shell publish output: $companion"
          }
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build native shell installer
        shell: powershell
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          New-Item -ItemType Directory -Force -Path "apps/windows-shell/dist" | Out-Null
          $outputDir = (Resolve-Path "apps/windows-shell/dist").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=preview-$shortSha" `
            "/DMyOutputDir=$outputDir" `
            "/DMyOutputBaseFilename=JAN-Label_preview-windows-native-shell_$shortSha" `
            "apps/windows-shell/installer/JanLabel.WindowsShell.iss"
      - uses: actions/upload-artifact@v7
        with:
          name: jan-label-native-shell
          path: apps/windows-shell/bin/Release/net8.0-windows/win-x64/publish/**
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: jan-label-native-shell-installer
          path: apps/windows-shell/dist/*.exe
          if-no-files-found: error

  docs-guard:
    name: docs-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Enforce docs updates for product changes
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          product_changed=false
          docs_changed=false

          while IFS= read -r path; do
            case "$path" in
              apps/*|crates/*|packages/*|scripts/*)
                product_changed=true
                ;;
            esac

            case "$path" in
              docs/*|README.md|CONTRIBUTING.md|SECURITY.md)
                docs_changed=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [[ "$product_changed" == "true" && "$docs_changed" != "true" ]]; then
            echo "Product code changed without docs update."
            exit 1
          fi
